spring:
  application:
    name: financehub-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financehub}
    username: ${DB_USERNAME:financehub}
    password: ${DB_PASSWORD:financehub_dev}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

financehub:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-change-me-please-use-at-least-32-bytes-long-key-xxx}
      expiration: ${JWT_EXPIRATION:PT24H}
  import:
    max-rows: 10000
    job-ttl: PT24H
    expiry-cron: "0 0 * * * *"

logging:
  level:
    com.financehub: INFO
    org.springframework: INFO
