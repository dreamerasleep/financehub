services:
  postgres:
    image: postgres:16-alpine
    container_name: financehub-postgres
    environment:
      POSTGRES_USER: financehub
      POSTGRES_PASSWORD: financehub_dev
      POSTGRES_DB: financehub
    ports:
      - "5432:5432"
    volumes:
      - financehub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financehub -d financehub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  financehub-pgdata:
